<!DOCTYPE html>

<html lang="de">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mythos</title>

  <style>

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      min-height: 100vh;

      font-family: Georgia, serif;

      color: #f5e8c8;

      background:

        linear-gradient(rgba(5, 8, 10, 0.35), rgba(5, 8, 10, 0.85)),

        url("https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1600&q=80");

      background-size: cover;

      background-position: center;

      overflow: hidden;

    }

    .world {

      min-height: 100vh;

      padding: 28px;

      display: flex;

      flex-direction: column;

      justify-content: space-between;

      backdrop-filter: blur(1px);

    }

    .title {

      font-size: 46px;

      letter-spacing: 4px;

      margin: 0;

      text-shadow: 0 3px 12px #000;

    }

    .subtitle {

      margin-top: 8px;

      font-size: 16px;

      color: #d9c79e;

    }

    .welcome {

      max-width: 360px;

      margin-top: 60px;

      line-height: 1.6;

      font-size: 18px;

      text-shadow: 0 2px 10px #000;

    }

    .menu {

      display: grid;

      gap: 12px;

      max-width: 320px;

    }

    button {

      background: rgba(20, 18, 12, 0.58);

      color: #f5e8c8;

      border: 1px solid rgba(245, 216, 150, 0.5);

      border-radius: 16px;

      padding: 14px 18px;

      font-size: 17px;

      font-family: Georgia, serif;

      text-align: left;

      box-shadow: 0 6px 20px rgba(0,0,0,0.35);

    }

    button:active {

      transform: scale(0.98);

    }

    .moods {

      display: flex;

      gap: 10px;

      overflow-x: auto;

      padding-bottom: 8px;

    }

    .mood {

      min-width: 110px;

      text-align: center;

      padding: 12px;

      border-radius: 18px;

      background: rgba(20, 18, 12, 0.52);

      border: 1px solid rgba(245, 216, 150, 0.35);

    }

    .quote {

      text-align: center;

      font-size: 16px;

      color: #e8d6aa;

      margin-top: 20px;

      text-shadow: 0 2px 10px #000;

    }

  </style>

</head>

<body>

  <main class="world">

    <section>

      <h1 class="title">MYTHOS</h1>

      <div class="subtitle">Dein Ort. Deine Geschichte. Dein Ursprung.</div>

      <div class="welcome">

        <p><strong>Willkommen zu Hause.</strong></p>

        <p>

          Deine Reise beginnt hier.  

          Nicht laut. Nicht eilig.  

          Sondern dort, wo deine Welt atmet.

        </p>

      </div>

    </section>

    <section>

      <div class="menu">

        <button>📜 Tagebuch</button>

        <button>🌙 Träume</button>

        <button>🧭 Reise beginnen</button>

        <button>🏡 Ort gestalten</button>

      </div>

      <p class="quote">„Hier darfst du ankommen. Hier darfst du sein.“</p>

      <div class="moods">

        <div class="mood">🌿 Ruhe</div>

        <div class="mood">🔥 Hoffnung</div>

        <div class="mood">✨ Staunen</div>

        <div class="mood">🌧 Melancholie</div>

        <div class="mood">⚔️ Abenteuer</div>

      </div>

    </section>

  </main>

</body>

</html>
