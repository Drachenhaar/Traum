<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragoncore 0.4 – Stabiles Fundament</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="scene">
    <section id="world" class="world" aria-label="Dragoncore erster Ort"></section>

    <section id="uiLayer" class="ui-layer">
      <button id="enterButton" class="enter-button">✦ Zum Buch gehen</button>

      <div id="bookText" class="book-text" aria-live="polite">
        <h1 id="title">DRAGONCORE</h1>
        <p id="line1">Willkommen.</p>
        <p id="line2">Dies ist kein Ort, der von dir verlangt, jemand anderes zu werden.</p>
        <p id="line3">Vielleicht erinnert er dich einfach daran, wer du schon bist.</p>
        <button id="openBookButton">Das Buch öffnen</button>
      </div>
    </section>

    <section id="orbLayer" class="orb-layer" aria-hidden="true"></section>
  </main>

  <script src="./js/text.js"></script>
  <script src="./js/orbs.js"></script>
  <script src="./js/camera.js"></script>
  <script src="./js/app.js"></script>

  <script>
  alert("Inline-JavaScript läuft");
</script>
